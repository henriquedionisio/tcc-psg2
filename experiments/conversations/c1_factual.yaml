id: C1
category: factual
title: "Ciclo da água"
objective: "Obter uma explicação precisa do ciclo da água com referências confiáveis"
difficulty: simple
seed_messages:
  - role: user
    turn: 1
    content: "Pode me explicar como funciona o ciclo da água?"
  - role: assistant
    turn: 2
    content: "O ciclo da água descreve a movimentação contínua da água na Terra. Envolve evaporação (água líquida vira vapor), condensação (vapor forma nuvens), precipitação (chuva/neve) e escoamento/infiltração de volta aos corpos d'água."
  - role: user
    turn: 3
    content: "Quais são as principais etapas e como elas se conectam?"
  - role: assistant
    turn: 4
    content: "As etapas se conectam em ciclo: evaporação e transpiração levam vapor à atmosfera; a condensação forma nuvens; a precipitação devolve água à superfície; infiltração e escoamento recarregam rios, lençóis e mares, reiniciando o ciclo."
  - role: user
    turn: 5
    content: "Como atividades humanas podem alterar esse ciclo?"
  - role: assistant
    turn: 6
    content: "Desmatamento, urbanização e uso intensivo de água alteram evapotranspiração e infiltração. Aquecimento global intensifica evaporação e pode mudar padrões de chuva, afetando disponibilidade hídrica regional."
