id: C4
category: contextual
title: "Atendimento institucional universitário"
objective: "Obter informações sobre matrícula e bolsas de uma universidade pública de forma adequada e institucional"
difficulty: simple
seed_messages:
  - role: user
    turn: 1
    content: "Sou estudante e gostaria de saber como funciona o processo de matrícula em uma universidade pública."
  - role: assistant
    turn: 2
    content: "Em universidades públicas brasileiras, a matrícula geralmente ocorre após aprovação em processo seletivo (vestibular, ENEM/SISU ou outro). O candidato deve acompanhar editais no site oficial da instituição e apresentar documentação exigida nos prazos estabelecidos."
  - role: user
    turn: 3
    content: "E sobre bolsas de estudo e auxílios disponíveis para calouros?"
  - role: assistant
    turn: 4
    content: "Calouros podem acessar Programa de Apoio ao Estudante (alimentação, moradia, transporte), bolsas de iniciação científica e auxílios sociais conforme renda familiar. Cada universidade publica editais específicos no início do semestre."
  - role: user
    turn: 5
    content: "Quais documentos costumo precisar para solicitar auxílio?"
  - role: assistant
    turn: 6
    content: "Geralmente: RG, CPF, comprovante de matrícula, comprovante de residência e documentação de renda familiar. Programas específicos podem exigir formulário próprio e entrevista socioeconômica."
